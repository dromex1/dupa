name: Build IPA for Sideloadly

on:
  workflow_dispatch:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Build IPA with Xcode
    runs-on: macos-latest
    env:
      GODOT_VERSION: 4.6-stable
      GODOT_TEMPLATES_VERSION: 4.6.stable

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Godot
        run: |
          curl -L -o godot.zip "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_macos.universal.zip"
          unzip -q godot.zip
          mv Godot.app /Applications/Godot.app
          rm godot.zip

      - name: Install Godot export templates
        run: |
          mkdir -p "$HOME/Library/Application Support/Godot/export_templates/${GODOT_TEMPLATES_VERSION}"
          curl -L -o templates.zip "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_export_templates.tpz"
          unzip -q templates.zip
          mv templates/* "$HOME/Library/Application Support/Godot/export_templates/${GODOT_TEMPLATES_VERSION}/"
          rm -rf templates templates.zip

      - name: Import Godot project
        run: |
          /Applications/Godot.app/Contents/MacOS/Godot --headless --import --quit

      - name: Export Xcode project
        run: |
          mkdir -p build/ios
          /Applications/Godot.app/Contents/MacOS/Godot --headless --export-release "iOS" build/ios/gowno.xcodeproj
          test -d build/ios/gowno.xcodeproj
          test -f build/ios/gowno.xcodeproj/project.pbxproj

      - name: Build unsigned app
        run: |
          cd build/ios
          xcodebuild build \
            -project gowno.xcodeproj \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_STYLE="Manual"
          APP_PATH="$(find build/Release-iphoneos -maxdepth 1 -name '*.app' -type d -print -quit)"
          test -n "$APP_PATH"

      - name: Package IPA
        run: |
          cd build/ios
          APP_PATH="$(find build/Release-iphoneos -maxdepth 1 -name '*.app' -type d -print -quit)"
          test -n "$APP_PATH"
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -r ../../Gra_gotowa_sideloadly.ipa Payload
          test -s ../../Gra_gotowa_sideloadly.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: Gra-Na-iPhone-Sideloadly
          path: Gra_gotowa_sideloadly.ipa
